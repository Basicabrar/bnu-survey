    function isPageValid(pageNum) {
        if (completed) return true;
        if (pageNum === 0) {
            const consentBox = document.getElementById('consentCheck');
            return consentBox && consentBox.checked;
        }
        if (pageNum === 1) {
            const q1 = document.getElementById('q1_uni');
            if (!q1 || q1.value.trim() === '') return false;
            const q2 = document.querySelector('input[name="q2_type"]:checked');
            if (!q2) return false;
            if (q2.value === 'Other' && !surveyData.q2_other?.trim()) return false;
            const q3 = document.querySelector('input[name="q3_level"]:checked');
            if (!q3) return false;
            if (q3.value === 'Other' && !surveyData.q3_other?.trim()) return false;
            const q4 = document.querySelector('input[name="q4_year"]:checked');
            if (!q4) return false;
            const q5 = document.querySelector('input[name="q5_field"]:checked');
            if (!q5) return false;
            if ((q5.value === 'Other' || q5.value === 'Other specify') && !surveyData.q5_other?.trim()) return false;
            const q6 = document.querySelector('input[name="q6_status"]:checked');
            if (!q6) return false;
            if (q6.value === 'Other' && !surveyData.q6_other?.trim()) return false;
            return true;
        }
        if (pageNum === 2) {
            const selected = document.querySelector('input[name="q7"]:checked');
            return !!selected;
        }
        if (pageNum === 3) {
            for (let i = 0; i < uicActivities.en.length; i++) {
                const radios = document.querySelectorAll(`input[name="q8_${i}"]`);
                let checked = false;
                for (let r of radios) if (r.checked) { checked = true; break; }
                if (!checked) return false;
            }
            return true;
        }

                for (let r of radios) if (r.checked) { checked = true; break; }
                if (!checked) return false;
            }
            return true;
        }
        if (pageNum === 8) {
            const q57 = document.querySelector('input[name="q57"]:checked');
            const q58 = document.querySelector('input[name="q58"]:checked');
            const q59 = document.querySelector('input[name="q59"]:checked');
            const q60 = document.querySelector('input[name="q60"]:checked');
            const q61 = document.querySelector('input[name="q61"]:checked');

            }

        }

            const q65 = document.querySelector('input[name="q65"]:checked');
            const q66 = document.querySelector('input[name="q66"]:checked');
            return !!(q64 && q65 && q66);
        }
        if (pageNum === 11) {
            const q67 = document.querySelector('input[name="q67"]:checked');

            const q69 = document.querySelector('input[name="q69"]:checked');

            const q72 = document.querySelector('input[name="q72"]:checked');

            const q74 = document.querySelector('input[name="q74"]:checked');
            if (!q67 || !q68 || !q69 || !q70 || !q71 || !q72) return false;
            if (!q73 || q73.value.trim() === '') return false;
            const ageVal = parseInt(q73.value);
            if (isNaN(ageVal) || ageVal < 15 || ageVal > 100) return false;
            if (!q74) return false;
            if (q74.value === 'Other' && !surveyData.q74_other?.trim()) return false;
            const q76 = document.querySelector('input[name="q76"]:checked');
            if (!q76) return false;
            // Phone is optional but if filled must be valid Bangladeshi number
            const phone = document.getElementById('contact_phone');
            if (phone && phone.value.trim() !== '') {
                if (!/^01[3-9][0-9]{8}$/.test(phone.value.trim())) return false;
            }
            return true;
        }
        return true;
    }

            html += `<div class="question">${q73Text} <span class="required-star">*</span> <input type="number" id="q73_age" min="15" max="100" placeholder="e.g. 22" style="width:120px;" value="${surveyData.q73_age || ''}"></div>`;
            // Q74 gender — last option needs an "Other" text input
            const q74OtherLabel = currentLang === 'en' ? "Other (please specify):" : "অন্যান্য (উল্লেখ করুন):";
            const q74OptsMain = q74Opts.slice(0, -1);
            let q74Html = `<div class="options">`;
            q74OptsMain.forEach(opt => {
                q74Html += `<label class="option"><input type="radio" name="q74" value="${opt}" ${surveyData.q74 === opt ? 'checked' : ''}> ${opt}</label>`;
            });
            q74Html += `<label class="option"><input type="radio" name="q74" value="Other" ${surveyData.q74 === 'Other' ? 'checked' : ''}> ${q74OtherLabel} <input type="text" id="q74_other" style="width:auto; margin-left:0.5rem;" placeholder="${currentLang === 'en' ? 'Specify' : 'উল্লেখ করুন'}" value="${surveyData.q74_other || ''}"></label>`;
            q74Html += `</div>`;
            html += `<div class="question">${q74Text} <span class="required-star">*</span> ${q74Html}</div>`;
            html += `<div class="question">${q75Text}<br><textarea rows="3" id="q75_comment">${surveyData.q75_comment || ''}</textarea></div>`;
            html += `<div class="question">${q76Text} <span class="required-star">*</span><br>${makeRadioGroup('q76', q76Opts, surveyData.q76)}</div>`;
            html += `<div class="question"><hr><h4>${currentLang === 'en' ? 'If you selected Yes, please provide contact details (optional):' : 'যদি হ্যাঁ হয়, অনুগ্রহ করে আপনার যোগাযোগের তথ্য দিন (ঐচ্ছিক):'}</h4>`;
            html += `<div>${contactName} <input type="text" id="contact_name" value="${surveyData.contact_name || ''}"></div>`;
            html += `<div>${contactPhone} <span style="font-weight:500;">+88</span> <input type="tel" id="contact_phone" style="width:calc(100% - 3.5rem);" placeholder="01XXXXXXXXX" pattern="01[3-9][0-9]{8}" maxlength="11" value="${surveyData.contact_phone || ''}"></div>`;
            html += `<div>${contactSocial} <input type="text" id="contact_social" value="${surveyData.contact_social || ''}"></div>`;
            html += `<div>${contactRecharge} <input type="text" id="contact_recharge" value="${surveyData.contact_recharge || ''}"></div>`;
            html += `</div><div class="didyouknow" style="margin-top:1rem;">${thankYou}</div>`;
            contentDiv.innerHTML = html;
            const optionalFields = ['q75_comment','contact_name','contact_phone','contact_social','contact_recharge','q73_age','q74_other'];
            optionalFields.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('change', (e) => surveyData[id] = e.target.value);
                    el.addEventListener('input', (e) => surveyData[id] = e.target.value);
                }
            });
            // Show/hide Q74 other text input
            const q74OtherInput = document.getElementById('q74_other');
            if (q74OtherInput) {
                // Insert * star after input
                if (!q74OtherInput.nextElementSibling || !q74OtherInput.nextElementSibling.classList.contains('required-star')) {
                    const star = document.createElement('span');
                    star.className = 'required-star';
                    star.textContent = ' *';
                    q74OtherInput.parentNode.insertBefore(star, q74OtherInput.nextSibling);
                }
                const q74Star = q74OtherInput.nextElementSibling;
                q74OtherInput.style.display = surveyData.q74 === 'Other' ? 'inline-block' : 'none';
                if (q74Star) q74Star.style.display = surveyData.q74 === 'Other' ? 'inline' : 'none';
                document.querySelectorAll('input[name="q74"]').forEach(r => {
                    r.addEventListener('change', () => {
                        q74OtherInput.style.display = r.value === 'Other' ? 'inline-block' : 'none';
                        if (q74Star) q74Star.style.display = r.value === 'Other' ? 'inline' : 'none';
                        if (r.value !== 'Other') { q74OtherInput.value = ''; surveyData.q74_other = ''; }
                    });
                });
            }
            for (let name of ['q67','q68','q69','q70','q71','q72','q74','q76']) {
                const radios = document.querySelectorAll(`input[name="${name}"]`);
                radios.forEach(radio => radio.addEventListener('change', (e) => surveyData[name] = e.target.value));
            }
        }
        // ----- Page 12: Thank You / Submit -----
        else if (currentPage === 12) {
            const thankTitle = currentLang === 'en' ? "Thank You!" : "আন্তরিক ধন্যবাদ!";
            const rechargeMsg = currentLang === 'en' 
                ? "You will receive a BDT 20 mobile recharge as a token of appreciation. It will be sent to the mobile number you provided (or to the contact number you entered). Thank you for your valuable contribution to this research!"
                : "আপনার মূল্যবান অংশগ্রহণের জন্য আপনাকে BDT ২০ মোবাইল রিচার্জ প্রদান করা হবে। এটি আপনার প্রদত্ত মোবাইল নম্বরে (বা যোগাযোগের নম্বরে) পাঠানো হবে। গবেষণায় অবদানের জন্য আন্তরিক ধন্যবাদ।";
            const finalNote = currentLang === 'en'
                ? "Your responses have been recorded. You may now close this window."
                : "আপনার উত্তর সংরক্ষণ করা হয়েছে। আপনি এখন এই উইন্ডোটি বন্ধ করতে পারেন।";
            const submitButton = currentLang === 'en' ? "Submit & Finish" : "জমা দিন ও সমাপ্ত করুন";
            let html = `
                <div class="question">
                    <div class="question-title">${thankTitle}</div>
                    <div class="bilingual-block">
                        <div class="bn-text">${rechargeMsg}</div>
                        <div class="en-text">${currentLang === 'bn' ? "You will receive a BDT 20 mobile recharge as a token of appreciation. It will be sent to the mobile number you provided (or to the contact number you entered). Thank you for your valuable contribution to this research!" : "আপনার মূল্যবান অংশগ্রহণের জন্য আপনাকে BDT ২০ মোবাইল রিচার্জ প্রদান করা হবে। এটি আপনার প্রদত্ত মোবাইল নম্বরে (বা যোগাযোগের নম্বরে) পাঠানো হবে। গবেষণায় অবদানের জন্য আন্তরিক ধন্যবাদ।"}</div>
                    </div>
                    <p style="margin-top:1rem;">${finalNote}</p>
                    <div style="text-align:center; margin-top:2rem;">
                        <button id="finalSubmitBtn" class="next-btn" style="background:#E4A835;">${submitButton}</button>
                    </div>
                </div>
            `;
            contentDiv.innerHTML = html;
            // ----- This is the part that sends data to Google Sheets -----
            function sendToGoogleSheets(data) {
    const url = 'https://script.google.com/macros/s/AKfycbzr7KycETZgJB7ea-aciopD1liToL1EushUpzZG4oAB-K9G9mHwncOTbxa7ProqdKKSyg/exec';
    
    const formData = new URLSearchParams();
    formData.append('data', JSON.stringify(data));
    
    fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString()
    })
    .then(() => console.log('Submitted'))
    .catch(err => console.error('Error:', err));
}
            document.getElementById('finalSubmitBtn').addEventListener('click', () => {
                if (completed) return;
                completed = true;
                // Merge "Other" text inputs into their parent radio values before submission
                const otherMerges = [
                    ['q2_type',   'q2_other'],
                    ['q3_level',  'q3_other'],
                    ['q5_field',  'q5_other'],
                    ['q6_status', 'q6_other'],
                    ['q74',       'q74_other'],
                ];
                const submitData = Object.assign({}, surveyData);
                otherMerges.forEach(([radioKey, textKey]) => {
                    const radioVal = submitData[radioKey] || '';
                    const textVal  = (submitData[textKey] || '').trim();
                    if ((radioVal === 'Other' || radioVal === 'Other specify') && textVal) {
                        submitData[radioKey] = 'Other: ' + textVal;
                    }
                });
                sendToGoogleSheets(submitData);
                alert(currentLang === 'en' ? 'Thank you! Your responses have been submitted. The BDT 20 recharge will be sent shortly.' : 'ধন্যবাদ! আপনার উত্তর জমা হয়েছে। শীঘ্রই BDT ২০ রিচার্জ পাঠানো হবে.');
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('prevBtn').style.display = 'none';
            });
        }

        // ----- Navigation buttons -----
        const nextBtn = document.getElementById('nextBtn');
        const newNextBtn = nextBtn.cloneNode(true);
        nextBtn.parentNode.replaceChild(newNextBtn, nextBtn);
        newNextBtn.addEventListener('click', (e) => {
            if (completed) {
                alert(currentLang === 'en' ? 'Survey already completed. Thank you!' : 'জরিপ ইতিমধ্যে সম্পন্ন হয়েছে। ধন্যবাদ!');
                return;
            }
            if (!isPageValid(currentPage)) {
                // Give specific feedback for number fields on page 11
                if (currentPage === 11) {
                    const q73 = document.getElementById('q73_age');
                    if (q73) {
                        const ageVal = parseInt(q73.value);
                        if (!q73.value.trim() || isNaN(ageVal) || ageVal < 15 || ageVal > 100) {
                            alert(currentLang === 'en' ? 'Please enter a valid age (15–100) in the field marked with *.' : 'অনুগ্রহ করে * চিহ্নিত ঘরে একটি সঠিক বয়স লিখুন (১৫–১০০)।');
                            return;
                        }
                    }
                    const phone = document.getElementById('contact_phone');
                    if (phone && phone.value.trim() !== '' && !/^01[3-9][0-9]{8}$/.test(phone.value.trim())) {
                        alert(currentLang === 'en' ? 'Please enter a valid Bangladeshi phone number (e.g. 01711000000).' : 'অনুগ্রহ করে একটি সঠিক বাংলাদেশি ফোন নম্বর দিন (যেমন: ০১৭১১০০০০০০)।');
                        return;
                    }
                }
                alert(currentLang === 'en' ? 'Please answer all questions marked with *.' : 'অনুগ্রহ করে * চিহ্নিত সকল প্রশ্নের উত্তর দিন।');
                return;
            }
            if (currentPage === 2) {
                const selected = surveyData.q7;
                if (selected === 'Yes') {
                    currentPage = 3;
                } else {
                    currentPage = 8;
                }
                renderPage();
                return;
            }
            if (currentPage < totalPages - 1) {
                currentPage++;
                renderPage();
            }
        });

        document.getElementById('prevBtn').onclick = () => {
            if (completed) return;
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        };
        document.getElementById('prevBtn').style.visibility = (currentPage === 0 || completed) ? 'hidden' : 'visible';
        if (currentPage === totalPages-1) {
            newNextBtn.style.display = 'none';
        } else {
            newNextBtn.style.display = '';
        }
    }

    function updateProgress() {
        const percent = ((currentPage + 1) / totalPages) * 100;
        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('pageIndicator').innerHTML = `Page ${currentPage + 1} / ${totalPages}`;
    }

    document.querySelectorAll('#langToggle button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#langToggle button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLang = btn.getAttribute('data-lang');
            renderPage();
        });
    });

    renderPage();
</script>
</body>
</html>
