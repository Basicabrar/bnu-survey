                        <div class="en-text">${currentLang === 'bn' ? "You will receive a BDT 20 mobile recharge as a token of appreciation. It will be sent to the mobile number you provided (or to the contact number you entered). Thank you for your valuable contribution to this research!" : "আপনার মূল্যবান অংশগ্রহণের জন্য আপনাকে BDT ২০ মোবাইল রিচার্জ প্রদান করা হবে। এটি আপনার প্রদত্ত মোবাইল নম্বরে (বা যোগাযোগের নম্বরে) পাঠানো হবে। গবেষণায় অবদানের জন্য আন্তরিক ধন্যবাদ।"}</div>
                    </div>
                    <p style="margin-top:1rem;">${finalNote}</p>
                    <div style="text-align:center; margin-top:2rem;">
                        <button id="finalSubmitBtn" class="next-btn" style="background:#E4A835;">${submitButton}</button>
                    </div>
                </div>
            `;
            contentDiv.innerHTML = html;
            // ----- This is the part that sends data to Google Sheets -----
            function sendToGoogleSheets(data) {
    const url = 'https://script.google.com/macros/s/AKfycbxrL1SPCyCUvgkBDxEyBICD9bm5uGQRzKVTDsLdBfFOBGHeeTE0ir9Vv02BmhPgWZ5ucg/exec';
    fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(response => console.log('Fetch succeeded, but no-cors hides response'))
    .catch(err => console.error('Fetch error:', err));
}
            document.getElementById('finalSubmitBtn').addEventListener('click', () => {
                if (completed) return;
                completed = true;
                sendToGoogleSheets(surveyData);
                alert(currentLang === 'en' ? 'Thank you! Your responses have been submitted. The BDT 20 recharge will be sent shortly.' : 'ধন্যবাদ! আপনার উত্তর জমা হয়েছে। শীঘ্রই BDT ২০ রিচার্জ পাঠানো হবে.');
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('prevBtn').style.display = 'none';
            });
        }

        // ----- Navigation buttons -----
        const nextBtn = document.getElementById('nextBtn');
        const newNextBtn = nextBtn.cloneNode(true);
        nextBtn.parentNode.replaceChild(newNextBtn, nextBtn);
        newNextBtn.addEventListener('click', (e) => {
            if (completed) {
                alert(currentLang === 'en' ? 'Survey already completed. Thank you!' : 'জরিপ ইতিমধ্যে সম্পন্ন হয়েছে। ধন্যবাদ!');
                return;
            }
            if (!isPageValid(currentPage)) {
                alert(currentLang === 'en' ? 'Please answer all required questions before proceeding.' : 'অনুগ্রহ করে এগিয়ে যাওয়ার আগে সব প্রয়োজনীয় প্রশ্নের উত্তর দিন।');
                return;
            }
            if (currentPage === 2) {
                const selected = surveyData.q7;
                if (selected === 'Yes') {
                    currentPage = 3;
                } else {
                    currentPage = 8;
                }
                renderPage();
                return;
            }
            if (currentPage < totalPages - 1) {
                currentPage++;
                renderPage();
            }
        });

        document.getElementById('prevBtn').onclick = () => {
            if (completed) return;
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        };
        document.getElementById('prevBtn').style.visibility = (currentPage === 0 || completed) ? 'hidden' : 'visible';
        if (currentPage === totalPages-1) {
            newNextBtn.style.display = 'none';
        } else {
            newNextBtn.style.display = '';
        }
    }

    function updateProgress() {
        const percent = ((currentPage + 1) / totalPages) * 100;
        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('pageIndicator').innerHTML = `Page ${currentPage + 1} / ${totalPages}`;
    }

    document.querySelectorAll('#langToggle button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#langToggle button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLang = btn.getAttribute('data-lang');
            renderPage();
        });
    });

    renderPage();
</script>
</body>
</html>
